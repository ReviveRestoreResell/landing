<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revive Restore Resell — Shop Our Stores</title>
<meta name="description" content="Curated resale for real life. Shop Revive Restore Resell on eBay and Poshmark — top-rated, 100% positive, 4,500+ items sold." />

<!-- ============================================================
     REVIVE RESTORE RESELL — Store Directory landing page
     Logo lettering + brand language + trust strip
     Stores: eBay + Poshmark (add Depop / FBMP here later)
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Pinyon+Script&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --cream:#F5EFE3; --sand:#EAE0CE; --espresso:#3B342B; --mocha:#6E6253;
    --terracotta:#BE7B57; --sage:#8E9A7C; --card:#FBF7EF; --line:#DCCFB8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Jost',sans-serif; color:var(--espresso);
    background:
      radial-gradient(circle at 20% 0%, #FBF6EC 0%, rgba(251,246,236,0) 55%),
      radial-gradient(circle at 85% 100%, #EFE6D4 0%, rgba(239,230,212,0) 50%),
      var(--cream);
    min-height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:48px 22px 36px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{width:100%; max-width:430px; text-align:center; animation:rise .8s ease both;}
  @keyframes rise{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}

  .mono{
    width:150px; height:150px; margin:0 auto 20px;
    border:1.5px solid var(--terracotta); border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative;
  }
  .mono::after{content:""; position:absolute; inset:8px; border:1px solid var(--line); border-radius:50%;}
  .rev{font-family:'Fraunces',serif; font-weight:500; font-size:25px; letter-spacing:8px; text-indent:8px; line-height:1;}
  .mline{width:58px; height:1px; background:var(--terracotta); margin:8px 0 2px;}
  .scr{font-family:'Pinyon Script',cursive; font-size:29px; color:var(--terracotta); line-height:1.1;}

  .tag{margin-top:8px; font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--mocha);}

  .divider{width:46px; height:1px; background:var(--terracotta); margin:22px auto; position:relative;}
  .divider::before,.divider::after{content:""; position:absolute; top:50%; width:4px; height:4px; border-radius:50%; background:var(--terracotta); transform:translateY(-50%);}
  .divider::before{left:-12px;} .divider::after{right:-12px;}

  .intro{font-family:'Fraunces',serif; font-style:italic; font-size:16px; line-height:1.6; color:var(--mocha); margin-bottom:24px; padding:0 6px;}

  .trust{display:flex; align-items:stretch; border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-bottom:30px;}
  .tcol{flex:1; padding:14px 4px;}
  .tcol + .tcol{border-left:1px solid var(--line);}
  .tn{font-family:'Fraunces',serif; font-size:19px; font-weight:500; color:var(--espresso); line-height:1;}
  .tl{font-size:10px; letter-spacing:1.3px; text-transform:uppercase; color:var(--mocha); margin-top:5px;}

  .stores{display:flex; flex-direction:column; gap:14px;}
  .store{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:var(--espresso);
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:17px 20px; text-align:left;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .store:hover{transform:translateY(-2px); border-color:var(--terracotta); box-shadow:0 10px 24px -14px rgba(59,52,43,.45);}
  .store .icon{
    flex:0 0 auto; width:42px; height:42px; border-radius:10px; background:var(--sand);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-size:19px; font-weight:500; color:var(--terracotta);
  }
  .store .label{flex:1 1 auto;}
  .store .name{font-family:'Fraunces',serif; font-size:18px; font-weight:500; line-height:1.1;}
  .store .sub{font-size:12px; font-weight:300; letter-spacing:1.5px; text-transform:uppercase; color:var(--mocha); margin-top:3px;}
  .store .arrow{flex:0 0 auto; color:var(--sage); transition:transform .18s ease, color .18s ease;}
  .store:hover .arrow{transform:translateX(3px); color:var(--terracotta);}

  footer{margin-top:30px; font-size:12px; font-weight:300; letter-spacing:1px; color:var(--mocha);}
</style>
</head>
<body>
  <main class="wrap">
    <div class="mono">
      <div class="rev">REVIVE</div>
      <div class="mline"></div>
      <div class="scr">Restore&nbsp;Resell</div>
    </div>

    <p class="tag">Curated resale for real life</p>

    <div class="divider"></div>

    <p class="intro">&ldquo;Every piece here has lived a little &mdash; and still has more life to give.&rdquo;</p>

    <div class="trust">
      <div class="tcol"><div class="tn">4,500+</div><div class="tl">Items sold</div></div>
      <div class="tcol"><div class="tn">5.0&#9733;</div><div class="tl">100% positive</div></div>
      <div class="tcol"><div class="tn">Top&#8209;Rated</div><div class="tl">eBay &amp; Posh</div></div>
    </div>

    <nav class="stores">
      <a class="store" href="https://www.ebay.com/str/reviverestoreresell" target="_blank" rel="noopener">
        <span class="icon">e</span>
        <span class="label">
          <span class="name">eBay</span>
          <span class="sub">Shop the store</span>
        </span>
        <span class="arrow">&#8594;</span>
      </a>

      <a class="store" href="https://poshmark.com/closet/revived77" target="_blank" rel="noopener">
        <span class="icon">P</span>
        <span class="label">
          <span class="name">Poshmark</span>
          <span class="sub">Shop the closet</span>
        </span>
        <span class="arrow">&#8594;</span>
      </a>
    </nav>

    <footer>&copy; <span id="yr"></span> Revive Restore Resell</footer>
  </main>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
